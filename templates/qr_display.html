<!DOCTYPE html>
<html>
<head>
    <title>QR Code</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light p-5 text-center">

    <h3>Asset QR Code</h3>

    <div class="bg-white p-4 shadow rounded d-inline-block">

        <strong>JPKN PROPERTY #{{ id }}</strong><br><br>

        <img src="data:image/png;base64,{{ qr_code }}" width="200"><br><br>

        <strong>S/N:</strong> {{ sn }}

    </div>

    <br><br>

    <button onclick="window.print()" class="btn btn-success">Print</button>
    <a href="/" class="btn btn-secondary">Back</a>

</body>
</html>
